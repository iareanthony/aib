apiVersion: apps/v1
kind: Deployment
metadata:
  name: privileged-app
  namespace: default
  labels:
    app: privileged-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: privileged-app
  template:
    metadata:
      labels:
        app: privileged-app
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: main
          image: nginx:latest
          ports:
            - containerPort: 80
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsNonRoot: false
            readOnlyRootFilesystem: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: default
  labels:
    app: secure-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      serviceAccountName: secure-sa
      containers:
        - name: app
          image: myapp:v1.2.3
          ports:
            - containerPort: 8080
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: public-lb
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: privileged-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: internal-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: secure-app
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: orphan-secret
  namespace: default
type: Opaque
data:
  password: cGFzc3dvcmQ=
