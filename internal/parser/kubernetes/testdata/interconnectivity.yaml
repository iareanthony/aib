---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
data:
  REDIS_URL: "redis://redis-svc.production.svc.cluster.local:6379/0"
  DB_HOST: "postgres-svc"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: production
spec:
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: myapp:latest
          env:
            - name: CACHE_ENDPOINT
              value: "redis://redis-svc.production.svc.cluster.local:6379"
            - name: METRICS_TARGET
              value: "http://metrics-svc:9090"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: production
spec:
  selector:
    app: redis
  ports:
    - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: production
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-svc
  namespace: production
spec:
  selector:
    app: metrics
  ports:
    - port: 9090
